apiVersion: apps/v1
kind: Deployment
metadata:
  name: gofr-task-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gofr
  template:
    metadata:
      labels:
        app: gofr
    spec:
      containers:
        - name: gofr-task-api
          image: gofr-task-api
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          envFrom:
            - configMapRef:
                name: test-service-env
---
apiVersion: v1
kind: Service
metadata:
  name: gofr-service
spec:
  selector:
    app: gofr
  type: NodePort
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30007
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: gofr-pdb
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: gofr
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gofr-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gofr-task-api
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
